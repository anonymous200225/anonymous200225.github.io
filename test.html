<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WEB IDE v1.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>

body {
  background: #555;
  font-family: sans-serif;
  margin: 0;
}

/* HEADER */
#header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #222;
  padding: 10px;
  z-index: 10;
}
#header #title {
  font-weight: bold;
  color: white;
  padding-left: 10px;
}

/* PREVIEW */
#previewArea {
  position: absolute;
  top: 42px;
  left: 0;
  width: 100%;
  height: 60%;
}
#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
}

/* TABS */
#tabs {
  display: flex;
  background: #333;
}
#tabs button {
  flex: 1;
  border: none;
  padding: 10px;
  background: #333;
  color: #fff;
  cursor: pointer;
}
#tabs button.active {
  background: #257;
}

#btnFullscreen {
  flex: 0 0 auto;
  width: 60px;
  background: #444;
  font-size: 20px;
}

/* EDITOR */
#editor {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  transition: all 0.35s ease; /* animasi */
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 250px;
  padding: 8px;
  background: #222;
  color: white;
  font-size: 14px;
  border: none;
  outline: none;
  transition: height 0.35s ease; /* animasi halus */
}

/* FULLSCREEN MODE FINAL */
.fullscreen-editor {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100vh !important;
  background: #222 !important;
  z-index: 9999 !important;
  padding-top: 45px; /* jarak untuk tabs */
}

.fullscreen-editor textarea {
  height: calc(100vh - 90px) !important;
}


.btn {
  padding: 5px 10px;
  font-size: 18px;
  background:#222;
  color:white;
  border:none;
  cursor:pointer;
}
.btn:active {
  opacity:0.7;
}


.preview-fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  background: #fff;
  margin: 0;
  padding: 0;
}

.hide-editor {
  display: none !important;
}

  #exitPreviewBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 10000;
  background: #000a;
  color: white;
  border: none;
  padding: 8px 12px;
  font-size: 22px;
  border-radius: 8px;
  display: none;
}


/* FIND BOX */
.find-panel {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e1e1e;
  color: white;
  padding: 12px;
  border-radius: 8px;
  z-index: 9999;
  width: 90%;
  max-width: 400px;
  display: none;
  box-shadow: 0 0 15px #0007;
  font-family: sans-serif;
}

.find-panel h3 {
  margin: 0 0 8px 0;
  font-size: 16px;
  text-align: center;
}

.find-panel input {
  width: 100%;
  padding: 7px;
  background: #333;
  color: white;
  border: 1px solid #555;
  border-radius: 5px;
  margin-top: 5px;
}

.find-panel button {
  margin-top: 10px;
  padding: 7px 12px;
  background: #257;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

.find-panel button:active {
  opacity: 0.7;
}


</style>
</head>
<body>

<div id="header">
  <span id="title">WEB IDE v1.1</span>
</div>

<div id="previewArea">
  <iframe id="previewFrame"></iframe>
</div>

  <button id="exitPreviewBtn">⨯</button>


<!-- EDITOR AREA -->
<div id="editor">

  <div id="tabs">
    <button class="active" onclick="switchTab('html')">HTML</button>
    <button onclick="switchTab('css')">CSS</button>
    <button onclick="switchTab('js')">JS</button>
    
    <button id="btnReset">❌</button>
    <button id="btnCopy">📄</button>
    <button id="btnPaste">📑</button>
    <button id="btnFindPanel" class="btn">🔍</button>
    
    <!-- tombol fullscreen -->
    <button id="btnFullscreen" onclick="toggleFullscreen()">↗</button>

    <button id="previewFullBtn" class="btn">⛶</button>

  </div>

  <textarea id="htmlEditor"></textarea>
  <textarea id="cssEditor" style="display:none"></textarea>
  <textarea id="jsEditor" style="display:none"></textarea>


<div id="findReplaceBox" class="find-panel">
  <h3>Cari & Ganti</h3>

  <input id="findText" placeholder="Cari teks...">
  <input id="replaceText" placeholder="Ganti dengan...">

  <div style="margin-top:10px; display:flex; gap:5px; justify-content:center;">
    <button onclick="findNext()">Next</button>
    <button onclick="replaceOne()">Replace</button>
    <button onclick="replaceAll()">Replace All</button>
    <button onclick="closeFindBox()" style="background:#922;">Tutup</button>
  </div>
</div>



</div>


  

<script>
// ---------------- TAB ----------------
function switchTab(tab) {
  htmlEditor.style.display = "none";
  cssEditor.style.display = "none";
  jsEditor.style.display = "none";

  document.getElementById(tab + "Editor").style.display = "block";

  document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// ---------------- PREVIEW ----------------
function updatePreview() {
  const html = htmlEditor.value;
  const css = "<style>" + cssEditor.value + "</style>";
  const js = "<script>" + jsEditor.value + "<\\/script>";

  const iframe = document.getElementById("previewFrame");
  iframe.contentDocument.open();
  iframe.contentDocument.write(html + css + js);
  iframe.contentDocument.close();
}

// ---------------- AUTOSAVE ----------------
function autoSave() {
  localStorage.setItem("IDE_HTML", htmlEditor.value);
  localStorage.setItem("IDE_CSS", cssEditor.value);
  localStorage.setItem("IDE_JS", jsEditor.value);
}

document.querySelectorAll("textarea").forEach(t => {
  t.addEventListener("input", () => {
    clearTimeout(window.previewTimer);
    window.previewTimer = setTimeout(updatePreview, 300);

    autoSave();
  });
});

// ---------------- FULLSCREEN EDITOR --------------- //
let isFull = false;

function toggleFullscreen() {
  const editor = document.getElementById("editor");
  const btn = document.getElementById("btnFullscreen");

  if (!isFull) {
    // Masuk fullscreen (halus)
    editor.classList.add("fullscreen-editor");
    document.body.style.overflow = "hidden";
    btn.textContent = "↙"; // keluar fullscreen
  } else {
    // Keluar fullscreen (halus)
    editor.classList.remove("fullscreen-editor");
    document.body.style.overflow = "auto";
    btn.textContent = "↗"; // masuk fullscreen
  }

  isFull = !isFull;
}


const previewFullBtn = document.getElementById("previewFullBtn");
const previewArea = document.getElementById("previewArea");
const editor = document.getElementById("editor");
const exitPreviewBtn = document.getElementById("exitPreviewBtn");

let previewFullscreen = false;

function applyPreviewFullscreen(state) {
  previewFullscreen = state;

  if (state) {
    previewArea.classList.add("preview-fullscreen");
    editor.classList.add("hide-editor");
    previewFullBtn.textContent = "↙";
    exitPreviewBtn.style.display = "block";
    document.body.style.overflow = "hidden";
  } else {
    previewArea.classList.remove("preview-fullscreen");
    editor.classList.remove("hide-editor");
    previewFullBtn.textContent = "⛶";
    exitPreviewBtn.style.display = "none";
    document.body.style.overflow = "auto";
  }
}

previewFullBtn.onclick = () => applyPreviewFullscreen(!previewFullscreen);
exitPreviewBtn.onclick = () => applyPreviewFullscreen(false);


// ---------------- CLIPBOARD ----------------
const btnCopy = document.getElementById("btnCopy");
const btnPaste = document.getElementById("btnPaste");

btnCopy.onclick = async ()=>{
  let active = document.querySelector("textarea:not([style*='display: none'])");
  await navigator.clipboard.writeText(active.value);
  btnCopy.textContent = "✔";
  setTimeout(()=>btnCopy.textContent="COPY",700);
};

btnPaste.onclick = async ()=>{
  let active = document.querySelector("textarea:not([style*='display: none'])");
  const text = await navigator.clipboard.readText();
  active.value += text;
  saveData();
  updatePreview();
  btnPaste.textContent = "✔";
  setTimeout(()=>btnPaste.textContent="PASTE",700);
};


// ---------------- RESET ------------------ //
const btnReset = document.getElementById("btnReset");

btnReset.onclick = () => {
  let active = document.querySelector("textarea:not([style*='display: none'])");

  active.value = "";       // kosongkan
  saveData();              // simpan kosong
  updatePreview();         // update live preview

  btnReset.textContent = "✔";
  setTimeout(() => btnReset.textContent = "CLEAR", 700);
};


// ====================== FIND & REPLACE ========================= //
const findBox = document.getElementById("findReplaceBox");
const btnFindPanel = document.getElementById("btnFindPanel");

let findIndex = 0;
let findMatches = [];
let activeTA;

// buka panel
btnFindPanel.onclick = () => {
  activeTA = document.querySelector("textarea:not([style*='display:none'])");
  findBox.style.display = "block";
  document.getElementById("findText").focus();
};

// tutup panel
function closeFindBox() {
  findBox.style.display = "none";
  findMatches = [];
  findIndex = 0;
}

// cari semua hasil
function findAll() {
  const word = document.getElementById("findText").value;
  if (!word) return [];

  const text = activeTA.value;
  let pos = text.indexOf(word);
  let list = [];

  while (pos !== -1) {
    list.push(pos);
    pos = text.indexOf(word, pos + word.length);
  }
  return list;
}

// pilih next
function findNext() {
  activeTA = document.querySelector("textarea:not([style*='display:none'])");

  findMatches = findAll();
  if (findMatches.length === 0) {
    alert("Teks tidak ditemukan.");
    return;
  }

  findIndex = (findIndex + 1) % findMatches.length;

  const pos = findMatches[findIndex];
  const word = document.getElementById("findText").value;

  activeTA.focus();
  activeTA.setSelectionRange(pos, pos + word.length);
}

// replace satu
function replaceOne() {
  if (!findMatches.length) findMatches = findAll();
  if (!findMatches.length) return;

  const from = document.getElementById("findText").value;
  const to = document.getElementById("replaceText").value;

  const pos = activeTA.selectionStart;
  const end = activeTA.selectionEnd;

  // hanya jika user sedang memilih kata yang dicari
  if (activeTA.value.substring(pos, end) === from) {
    activeTA.setRangeText(to, pos, end, "end");
    autoSave();
    updatePreview();
  }

  findNext();
}

// replace all
function replaceAll() {
  const from = document.getElementById("findText").value;
  const to = document.getElementById("replaceText").value;

  if (!from) return;

  activeTA.value = activeTA.value.split(from).join(to);

  autoSave();
  updatePreview();
  
  alert("Selesai mengganti semua.");
}



  
// ---------------- LOAD SAVED DATA ----------------
htmlEditor.value = localStorage.getItem("IDE_HTML") || "<h1>Hello world!</h1>";
cssEditor.value = localStorage.getItem("IDE_CSS") || "body { background: white; font-family: sans-serif; }";
jsEditor.value = localStorage.getItem("IDE_JS") || "console.log('JS berjalan!');";

updatePreview();
</script>

</body>
</html>
