<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Web App Workspace - Split IDE</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: monospace;
}

header {
  background: #222;
  color: #fff;
  padding: 8px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header button {
  background: #444;
  border: none;
  padding: 5px 5px;
  color: #fff;
  cursor: pointer;
  border-radius: 8px;
}

#container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#editorArea {
  width: 50%;
  resize: horizontal;
  overflow: auto;
  border-right: 3px solid #777;
  display: flex;
  flex-direction: column;
}

#tabs {
  display: flex;
  background: #333;
}

#tabs button {
  flex: 1;
  border: none;
  padding: 10px;
  background: #333;
  color: #fff;
  cursor: pointer;
}

#tabs button.active {
  background: #555;
}

textarea {
  flex: 1;
  width: 100%;
  background: #1e1e1e;
  color: #fff;
  border: none;
  padding: 10px;
  font-size: 12px;
  outline: none;
  resize: none;
}

#previewArea {
  flex: 1;
  position: relative;
}

#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
}

#fullscreenBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #0008;
  color: #fff;
  padding: 5px 10px;
  border: none;
  cursor: pointer;
}

/* Light mode */
body.light {
  background: #f0f0f0;
}

body.light textarea {
  background: #fff;
  color: #000;
}

body.light header {
  background: #ddd;
  color: #000;
}

body.light #tabs {
  background: #ccc;
}

body.light #tabs button {
  background: #ccc;
  color: #000;
}

body.light #tabs button.active {
  background: #eee;
}
</style>
</head>
<body>

<header>
  <div>WEB IDE</div>
  <div>
    <button onclick="toggleMode()">Mode</button>
    <button onclick="saveProject()">Save</button>
    <button onclick="loadProject()">Load</button>
    <button onclick="exportProject()">Export</button>
    <button onclick="importProject()">Import</button>
  </div>
</header>

<div id="container">

  <div id="editorArea">

    <div id="tabs">
      <button class="active" onclick="switchTab('html')">HTML</button>
      <button onclick="switchTab('css')">CSS</button>
      <button onclick="switchTab('js')">JS</button>
    </div>

    <textarea id="htmlEditor"></textarea>
    <textarea id="cssEditor" style="display:none"></textarea>
    <textarea id="jsEditor" style="display:none"></textarea>

  </div>

  <div id="previewArea">
    <iframe id="previewFrame"></iframe>
    <button id="fullscreenBtn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>

</div>

<script>

// ================= TAB =====================
function switchTab(tab) {
  document.getElementById("htmlEditor").style.display = "none";
  document.getElementById("cssEditor").style.display = "none";
  document.getElementById("jsEditor").style.display = "none";

  document.getElementById(tab + "Editor").style.display = "block";

  document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// ================= LIVE PREVIEW =====================
function updatePreview() {
  const html = document.getElementById("htmlEditor").value;
  const css = "<style>" + document.getElementById("cssEditor").value + "</style>";
  const js = "<script>" + document.getElementById("jsEditor").value + "<\/script>";

  const iframe = document.getElementById("previewFrame");
  const content = html + css + js;
  iframe.contentDocument.open();
  iframe.contentDocument.write(content);
  iframe.contentDocument.close();
}

document.querySelectorAll("textarea").forEach(t => {
  t.addEventListener("input", () => {
    clearTimeout(window.previewTimer);
    window.previewTimer = setTimeout(updatePreview, 300);
  });
});

// ================= DARK / LIGHT MODE =====================
function toggleMode() {
  document.body.classList.toggle("light");
}

// ================= FULLSCREEN PREVIEW =====================
function toggleFullscreen() {
  const preview = document.getElementById("previewArea");
  if (!document.fullscreenElement) {
    preview.requestFullscreen();
    event.target.textContent = "Exit Fullscreen";
  } else {
    document.exitFullscreen();
    event.target.textContent = "Fullscreen";
  }
}

// ================= PROJECT SAVE/LOAD =====================
function saveProject() {
  const project = {
    html: htmlEditor.value,
    css: cssEditor.value,
    js: jsEditor.value
  };
  localStorage.setItem("workspace_project", JSON.stringify(project));
  alert("Project saved!");
}

function loadProject() {
  const data = localStorage.getItem("workspace_project");
  if (!data) return alert("Tidak ada project tersimpan.");
  const p = JSON.parse(data);
  htmlEditor.value = p.html;
  cssEditor.value = p.css;
  jsEditor.value = p.js;
  updatePreview();
  alert("Project loaded!");
}

// ================= EXPORT =====================
function exportProject() {
  const project = {
    html: htmlEditor.value,
    css: cssEditor.value,
    js: jsEditor.value
  };
  const blob = new Blob([JSON.stringify(project)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "project.json";
  a.click();
}

// ================= IMPORT =====================
function importProject() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      const p = JSON.parse(reader.result);
      htmlEditor.value = p.html;
      cssEditor.value = p.css;
      jsEditor.value = p.js;
      updatePreview();
    };
    reader.readAsText(file);
  };
  input.click();
}

// Initial empty code
htmlEditor.value = "<h1>Hello world!</h1>";
cssEditor.value = "body { background: white; font-family: sans-serif; }";
jsEditor.value = "console.log('JS berjalan!');";
updatePreview();
</script>

</body>
</html>
