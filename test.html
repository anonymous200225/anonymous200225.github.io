<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WEB IDE v1.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body {
  background: #555;
  font-family: sans-serif;
  margin: 0;
}

/* HEADER */
#header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #222;
  padding: 10px;
  z-index: 10;
}
#header #title {
  font-weight: bold;
  color: white;
  padding-left: 10px;
}

/* PREVIEW */
#previewArea {
  position: absolute;
  top: 42px;
  left: 0;
  width: 100%;
  height: 60%;
}
#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
}

/* TABS */
#tabs {
  display: flex;
  background: #333;
}
#tabs button {
  flex: 1;
  border: none;
  padding: 10px;
  background: #333;
  color: #fff;
  cursor: pointer;
}
#tabs button.active {
  background: #257;
}

#btnFullscreen {
  flex: 0 0 auto;
  width: 60px;
  background: #444;
  font-size: 20px;
}

/* EDITOR */
#editor {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
}

textarea {
  width: 100%;
  height: 250px;
  padding: 8px;
  background: #222;
  color: white;
  font-size: 14px;
  border: none;
  outline: none;
}

/* FULLSCREEN MODE */
.fullscreen-editor {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999 !important;
  background: #000 !important;
}
.fullscreen-editor textarea {
  height: calc(100vh - 50px) !important;
}
.fullscreen-header {
  background: #111;
  padding: 10px;
  color: white;
  text-align: center;
}



  /* Animasi halus fullscreen */
#editor {
  transition: all 0.35s ease;
}

.fullscreen-editor {
  position: fixed !important;
  bottom: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100vh !important;
  background: #222;
  z-index: 999;
  padding-top: 45px; /* agar tab tidak ketiban */
}

/* Transisi textarea */
textarea {
  transition: height 0.35s ease;
}

.fullscreen-editor textarea {
  height: calc(100vh - 90px) !important;
}

</style>
</head>
<body>

<div id="header">
  <span id="title">WEB IDE v1.1</span>
</div>

<div id="previewArea">
  <iframe id="previewFrame"></iframe>
</div>

<!-- EDITOR AREA -->
<div id="editor">

  <div id="tabs">
    <button class="active" onclick="switchTab('html')">HTML</button>
    <button onclick="switchTab('css')">CSS</button>
    <button onclick="switchTab('js')">JS</button>

    <!-- tombol fullscreen -->
    <button id="btnFullscreen" onclick="toggleFullscreen()">↗</button>
  </div>

  <textarea id="htmlEditor"></textarea>
  <textarea id="cssEditor" style="display:none"></textarea>
  <textarea id="jsEditor" style="display:none"></textarea>

</div>

<script>
// ---------------- TAB ----------------
function switchTab(tab) {
  htmlEditor.style.display = "none";
  cssEditor.style.display = "none";
  jsEditor.style.display = "none";

  document.getElementById(tab + "Editor").style.display = "block";

  document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// ---------------- PREVIEW ----------------
function updatePreview() {
  const html = htmlEditor.value;
  const css = "<style>" + cssEditor.value + "</style>";
  const js = "<script>" + jsEditor.value + "<\\/script>";

  const iframe = document.getElementById("previewFrame");
  iframe.contentDocument.open();
  iframe.contentDocument.write(html + css + js);
  iframe.contentDocument.close();
}

// ---------------- AUTOSAVE ----------------
function autoSave() {
  localStorage.setItem("IDE_HTML", htmlEditor.value);
  localStorage.setItem("IDE_CSS", cssEditor.value);
  localStorage.setItem("IDE_JS", jsEditor.value);
}

document.querySelectorAll("textarea").forEach(t => {
  t.addEventListener("input", () => {
    clearTimeout(window.previewTimer);
    window.previewTimer = setTimeout(updatePreview, 300);

    autoSave();
  });
});

// ---------------- FULLSCREEN EDITOR --------------- //
let isFull = false;

function toggleFullscreen() {
  const editor = document.getElementById("editor");
  const btn = document.getElementById("btnFullscreen");

  if (!isFull) {
    // Masuk fullscreen (halus)
    editor.classList.add("fullscreen-editor");
    document.body.style.overflow = "hidden";
    btn.textContent = "↙"; // keluar fullscreen
  } else {
    // Keluar fullscreen (halus)
    editor.classList.remove("fullscreen-editor");
    document.body.style.overflow = "auto";
    btn.textContent = "↗"; // masuk fullscreen
  }

  isFull = !isFull;
}

  
// ---------------- LOAD SAVED DATA ----------------
htmlEditor.value = localStorage.getItem("IDE_HTML") || "<h1>Hello world!</h1>";
cssEditor.value = localStorage.getItem("IDE_CSS") || "body { background: white; font-family: sans-serif; }";
jsEditor.value = localStorage.getItem("IDE_JS") || "console.log('JS berjalan!');";

updatePreview();
</script>

</body>
</html>
