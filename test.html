<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YT ke MP3 (Auto Switch)</title>
<style>
body { font-family:sans-serif; padding:20px; background:#111; color:#fff }
input,button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none }
button { background:#0c7; font-weight:bold }
#preview { margin-top:15px; display:none }
.loader { display:none; margin-top:20px; text-align:center }
.loader div {
  width:30px; height:30px; border:4px solid #0c7;
  border-top:4px solid transparent; border-radius:50%;
  animation:spin 0.8s linear infinite; margin:auto
}
@keyframes spin { 100% { transform:rotate(360deg) } }
</style>
</head>
<body>

<h2>Convert YT ke MP3 v3</h2>

<input id="url" placeholder="Tempel URL YouTube...">
<button onclick="startConvert()">Convert</button>

<div class="loader" id="loader"><div></div></div>
<div id="preview"></div>
<div id="result"></div>

<script>
const servers = [
  "https://pipedapi.kavin.rocks",
  "https://pipedapi.in",
  "https://pipedapi.es",
  "https://pipedapi.tokhmi.xyz",
  "https://pipedapi.leptons.xyz"
];

function getID(url){
  let m=url.match(/(?:v=|youtu\.be\/)([^&\s]+)/);
  return m?m[1]:null;
}

async function fetchFromServers(id){
  for (let base of servers){
      let api = `${base}/streams/${id}`;
      try{
          let r = await fetch(api, { method:"GET" });
          if(!r.ok) continue;
          let j = await r.json();
          if(j.audioStreams && j.audioStreams.length){
              return j.audioStreams[0].url;
          }
      }catch(e){
          continue;
      }
  }
  return null;
}

async function startConvert(){
  let link=document.getElementById("url").value.trim();
  if(!link) return;

  let id=getID(link);
  if(!id){ alert("URL tidak valid"); return }

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";
  document.getElementById("preview").style.display="block";
  document.getElementById("preview").innerHTML=
    `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}"></iframe>`;

  let audio = await fetchFromServers(id);

  document.getElementById("loader").style.display="none";

  if(!audio){
      document.getElementById("result").innerHTML="Semua server gagal merespon.";
      return;
  }

  document.getElementById("result").innerHTML=
    `<a href="${audio}" style="
        display:block;margin-top:10px;padding:12px;
        background:#0c7;color:#000;text-align:center;
        border-radius:10px;font-weight:bold;
    ">Download Audio</a>`;
}
</script>

</body>
</html>
