<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WEB IDE Pro v2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* RESET DAN VARIABLES */
:root {
  /* Tema Gelap (Default) */
  --primary-bg: #0f172a;
  --secondary-bg: #1e293b;
  --tertiary-bg: #334155;
  --editor-bg: #0d1117;
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --border: #475569;
  --shadow: rgba(0, 0, 0, 0.3);
  --preview-bg: #ffffff;
}

.light-mode {
  /* Tema Terang */
  --primary-bg: #f1f5f9;
  --secondary-bg: #ffffff;
  --tertiary-bg: #e2e8f0;
  --editor-bg: #ffffff;
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #dc2626;
  --success: #059669;
  --warning: #d97706;
  --border: #cbd5e1;
  --shadow: rgba(0, 0, 0, 0.1);
  --preview-bg: #f8fafc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--primary-bg);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  transition: background-color 0.3s, color 0.3s;
}

/* LAYOUT UTAMA */
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  background: var(--secondary-bg);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 8px var(--shadow);
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  font-size: 22px;
  color: var(--accent);
}

.logo-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}

.logo-version {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--tertiary-bg);
  padding: 2px 8px;
  border-radius: 12px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* TAB NAVIGATION */
.tab-nav {
  background: var(--secondary-bg);
  padding: 0 20px;
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: thin;
}

.tab {
  padding: 10px 24px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tab:hover {
  color: var(--text-primary);
  background: var(--primary-bg);
}

.tab.active {
  color: var(--accent);
  background: var(--primary-bg);
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

.tab-badge {
  font-size: 11px;
  background: var(--warning);
  color: white;
  padding: 2px 6px;
  border-radius: 10px;
  display: none;
}

.tab.unsaved .tab-badge {
  display: block;
}

/* MAIN CONTENT */
.main-content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* EDITOR PANEL */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
}

.editor-header {
  padding: 12px 20px;
  background: var(--secondary-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.editor-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.editor-actions {
  display: flex;
  gap: 8px;
}

/* EDITOR CONTAINER */
.editor-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

.line-numbers {
  width: 50px;
  background: var(--tertiary-bg);
  color: var(--text-muted);
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  padding: 16px 8px;
  text-align: right;
  line-height: 1.5;
  overflow: hidden;
  user-select: none;
  border-right: 1px solid var(--border);
}

.editor-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.code-editor {
  width: 100%;
  height: 100%;
  padding: 16px;
  background: var(--editor-bg);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 14px;
  line-height: 1.5;
  border: none;
  outline: none;
  resize: none;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
  tab-size: 2;
  caret-color: var(--accent);
}

/* TOOLBAR */
.toolbar {
  background: var(--secondary-bg);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 8px var(--shadow);
}

.toolbar-left {
  display: flex;
  gap: 8px;
}

.toolbar-right {
  display: flex;
  gap: 8px;
}

/* BUTTONS */
.btn {
  padding: 8px 16px;
  background: var(--tertiary-bg);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}

.btn:hover {
  background: var(--primary-bg);
  border-color: var(--accent);
  transform: translateY(-1px);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

.btn-success {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.btn-danger {
  background: var(--danger);
  border-color: var(--danger);
  color: white;
}

.btn-icon {
  padding: 8px;
  width: 36px;
  justify-content: center;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
}

.btn-group {
  display: flex;
  gap: 4px;
}

.btn-group .btn {
  border-radius: 0;
}

.btn-group .btn:first-child {
  border-radius: 6px 0 0 6px;
}

.btn-group .btn:last-child {
  border-radius: 0 6px 6px 0;
}

/* FIND PANEL */
.find-panel {
  position: absolute;
  bottom: 70px;
  right: 20px;
  background: var(--secondary-bg);
  color: var(--text-primary);
  padding: 20px;
  border-radius: 8px;
  z-index: 1000;
  width: 350px;
  display: none;
  box-shadow: 0 4px 20px var(--shadow);
  border: 1px solid var(--border);
}

.find-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.find-title {
  font-size: 14px;
  font-weight: 600;
}

.find-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
}

.find-close:hover {
  color: var(--text-primary);
}

.find-input-group {
  margin-bottom: 12px;
}

.find-label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.find-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--primary-bg);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}

.find-input:focus {
  outline: none;
  border-color: var(--accent);
}

.find-buttons {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

/* STATUS */
.status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--success);
  color: white;
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 1000;
  box-shadow: 0 4px 12px var(--shadow);
}

/* PREVIEW FULLSCREEN MODE */
.preview-fullscreen {
  overflow: hidden;
}

.preview-fullscreen .editor-panel {
  display: none;
}

.preview-fullscreen .tab-nav,
.preview-fullscreen .toolbar {
  display: none;
}

.preview-fullscreen .preview-overlay {
  display: block;
}

/* PREVIEW OVERLAY */
.preview-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: var(--preview-bg);
  z-index: 2000;
  display: none;
  flex-direction: column;
}

.preview-close {
  position: absolute;
  bottom: 250px;
  right: 15px;
  background: var(--tertiary-bg);
  border: 1px solid #bbb;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 24px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all 0.2s;
}

.preview-close:hover {
  background: rgba(50,0,0);
  color: red;
}

#btnRunJS {
  position: absolute;

  cursor: pointer;
  font-size: 24px;
  width: 40px;

  display: flex;
  align-items: center;

  transition: all 0.2s;
}

.preview-content {
  flex: 1;
  overflow: auto;
  background: white;
  padding: 0;
  color: #333;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .main-content {
    flex-direction: column;
  }
  
  .editor-panel {
    height: 50%;
  }
}

@media (max-width: 768px) {
  .header {
    padding: 10px 20px;
  }
  
  .logo-text {
    font-size: 16px;
  }
  
  .tab-nav {
    padding: 0;
  }
  
  .tab {
    padding: 10px 16px;
    font-size: 14px;
  }
  
  .editor-header, .preview-header {
    padding: 5px 12px;
  }
  
  .toolbar {
    padding: 6px 8px;
    flex-wrap: wrap;
    gap: 0px;
  }
  
  .toolbar-left, .toolbar-right {
    flex-wrap: wrap;
  }
  
  .btn {
    padding: 6px 10px;
    font-size: 12px;
  }
  
  .find-panel {
    width: calc(100% - 32px);
    right: 16px;
  }
}

@media (max-width: 480px) {
  .header-actions .btn span {
    display: none;
  }
  
  .tab {
    padding: 8px 10px;
  }
  
  .line-numbers {
    width: 40px;
    font-size: 12px;
  }
  
  .code-editor {
    font-size: 13px;
    padding: 12px;
  }
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

::-webkit-scrollbar-track {
  background: var(--tertiary-bg);
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

/* ANIMATIONS */
@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.find-panel {
  animation: slideIn 0.2s ease-out;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.btn:active {
  animation: pulse 0.2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.preview-overlay {
  animation: fadeIn 0.3s ease-out;
}


.inject-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: auto;
}

#injectArea {
  position: absolute;
  bottom: 0;
  left: 0;
  width: calc(100% - 15px);
  height: 200px;
  border: 1px solid #bbb;
  border-radius: 10px;
  padding: 10px;
  background: #eee;
  color: black;
}

#btnInjectRun {
  position: absolute;
  bottom: 205px;
  right: 15px;
  background: var(--tertiary-bg);
  border: 1px solid #bbb;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 24px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all 0.2s;
}
</style>

</head>
<body>

<div id="main" class="container">
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-code"></i></div>
        <div>
          <div class="logo-text">WEB IDE Pro</div>

<script>
// ===================== VARIABLES =====================
const codeData = {
  html: localStorage.getItem('IDE_HTML') || ``,
  css: localStorage.getItem('IDE_CSS') || ``,
  js: localStorage.getItem('IDE_JS') || ``,
  inject: localStorage.getItem('IDE_INJECT') || ``,
};

let currentTab = 'html';
let unsavedChanges = { html: false, css: false, js: false, inject: false };

// ===================== ELEMENTS =====================
const codeEditor = document.getElementById('codeEditor');
const lineNumbers = document.getElementById('lineNumbers');
const tabs = document.querySelectorAll('.tab');
const currentTabTitle = document.getElementById('currentTabTitle');
const previewOverlay = document.getElementById('previewOverlay');
const previewContent = document.getElementById('previewContent');
const previewClose = document.getElementById('previewClose');

// ===================== FUNCTIONS =====================
function generatePreviewHTML() {
  const html = codeData.html;
  const css = codeData.css;
  const js = codeData.js;

  return `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>${css}</style>
    </head>
    <body>
      ${html}
      <script defer>
        window.addEventListener("message", function(event){
          try { eval(event.data); }
          catch(e){ console.error("Error:", e); }
        });

        try { ${js} }
        catch(error){
          console.error("JavaScript Error:", error);
          document.body.innerHTML += '<div style="color:red;padding:20px;border:1px solid red;margin:10px;">JS ERROR: ' + error.message + '</div>';
        }
      <\/script>
    </body>
    </html>
  `;
}

// Jalankan script inject dari textarea ke preview iframe
function runInjectScript(code) {
  const iframe = previewContent.querySelector('iframe');
  if (!iframe) return showStatus("Preview belum dibuka", "error");

  try {
    iframe.contentWindow.postMessage(code, "*");
    showStatus("Inject script dijalankan di preview", "success");
  } catch (err) {
    showStatus("Error menjalankan inject script: " + err.message, "error");
  }
}

// Pasang listener sekali per iframe
function addIframeListener(iframe) {
  if (!iframe._listenerAdded) {
    iframe.contentWindow.addEventListener("message", (event) => {
      try { eval(event.data); }
      catch (err) { console.error("Error injected script:", err); }
    });
    iframe._listenerAdded = true;
  }
}

// Tampilkan preview fullscreen
function showPreview() {
  const fullHTML = generatePreviewHTML();
  previewContent.innerHTML = '';

  let iframe = previewContent.querySelector('iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    previewContent.appendChild(iframe);

    // Pasang listener sekali saja saat iframe dibuat
    iframe.contentWindow.addEventListener('message', (event) => {
      try { eval(event.data); }
      catch (err) { console.error("Error injected script:", err); }
    });
  }

  const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
  iframeDoc.open();
  iframeDoc.write(fullHTML);
  iframeDoc.close();

  previewOverlay.style.display = 'flex';
  document.body.classList.add('preview-fullscreen');
  //showStatus('Preview dibuka dalam mode fullscreen', 'info');
}


function hidePreview() {
  previewOverlay.style.display = 'none';
  document.body.classList.remove('preview-fullscreen');
  //showStatus('Preview ditutup', 'info');
}

function updateLineNumbers() {
  const lines = codeEditor.value.split('\n').length;
  let numbers = '';
  for (let i = 1; i <= lines; i++) numbers += i + '<br>';
  lineNumbers.innerHTML = numbers;
  lineNumbers.scrollTop = codeEditor.scrollTop;
}

function saveCurrentTab() {
  codeData[currentTab] = codeEditor.value;
  localStorage.setItem(`IDE_${currentTab.toUpperCase()}`, codeEditor.value);
  unsavedChanges[currentTab] = false;
  document.querySelector(`[data-tab="${currentTab}"]`)?.classList.remove('unsaved');
  //showStatus('Kode disimpan', 'success');
}

function switchTab(tabName) {
  saveCurrentTab();

  tabs.forEach(tab => tab.dataset.tab === tabName ? tab.classList.add('active') : tab.classList.remove('active'));
  currentTab = tabName;
  codeEditor.value = codeData[tabName];
  currentTabTitle.textContent = `${tabName.toUpperCase()} Editor`;
  updateLineNumbers();
  codeEditor.focus();
  //showStatus(`Beralih ke ${tabName.toUpperCase()}`, 'info');
}

function formatCode() {
  let code = codeEditor.value;
  if (currentTab === 'html') code = code.replace(/(>)(<)(\/*)/g,'$1\n$2$3').replace(/(<\/\w+>)/g,'$1\n').replace(/^\s+/gm,'').replace(/\n\s*\n/g,'\n');
  if (currentTab === 'css') code = code.replace(/;\s*/g,';\n  ').replace(/{\s*/g,' {\n  ').replace(/}/g,'\n}\n\n').replace(/\n\s*\n/g,'\n');
  if (currentTab === 'js') code = code.replace(/;/g,';\n').replace(/{/g,' {\n  ').replace(/}/g,'\n}\n').replace(/\n\s*\n/g,'\n');
  codeEditor.value = code.trim();
  updateLineNumbers();
  saveCurrentTab();
}

function showStatus(message, type='info') {
  const status = document.getElementById('statusMessage');
  const colors = { success:'var(--success)', error:'var(--danger)', warning:'var(--warning)', info:'var(--accent)' };
  status.textContent = message;
  status.style.background = colors[type] || colors.info;
  status.style.opacity = '1';
  setTimeout(() => { status.style.opacity='0'; }, 3000);
}

// ===================== EVENT LISTENERS =====================
tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));

codeEditor.addEventListener('input', () => {
  updateLineNumbers();
  unsavedChanges[currentTab] = true;
  document.querySelector(`[data-tab="${currentTab}"]`)?.classList.add('unsaved');
  clearTimeout(window.saveTimer);
  window.saveTimer = setTimeout(saveCurrentTab, 2000);
});

codeEditor.addEventListener('scroll', () => { lineNumbers.scrollTop = codeEditor.scrollTop; });

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const icon = document.querySelector('#themeToggle i');
  icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('IDE_THEME', document.body.classList.contains('light-mode')?'light':'dark');
  //showStatus(`Tema ${document.body.classList.contains('light-mode')?'terang':'gelap'} diaktifkan`, 'success');
});

document.getElementById('btnClear').addEventListener('click', () => {
  if(confirm('Apakah Anda yakin ingin menghapus kode di tab ini?')){
    codeEditor.value=''; updateLineNumbers(); showStatus('Kode dihapus','warning');
  }
});

document.getElementById('btnCopy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(codeEditor.value); showStatus('Kode disalin ke clipboard','success'); }
  catch { showStatus('Gagal menyalin kode','error'); }
});

document.getElementById('btnPaste').addEventListener('click', () => showStatus("Tombol belum berfungsi!", "error"));

document.getElementById('btnFormat').addEventListener('click', formatCode);

/*
document.getElementById('btnSave').addEventListener('click', saveCurrentTab);
*/

document.getElementById('btnFullscreenPreview').addEventListener('click', showPreview);
previewClose.addEventListener('click', hidePreview);

// Inject script dari textarea injectArea
document.getElementById("btnInjectRun").addEventListener("click", () => {
  const code = document.getElementById("injectArea").value;
  if (!code.trim()) return showStatus("Inject script kosong","warning");
  runInjectScript(code);
});


// Inject script dari tab inject
const btnRun = document.getElementById("btnInjectScript");
btnRun.onclick = () => {
  try {
    if(currentTab === "inject"){
      new Function(codeEditor.value)();
    } else {
      document.querySelectorAll(".tab")[3].click();
      new Function(codeEditor.value)();
    }
  } catch(e) {
    showStatus(e.message, "error");
  }
};


// ===================== FIND & REPLACE =====================
let findMatches = [], findIndex = -1;
function performFind() {
  const word = document.getElementById('findInput').value; if(!word) return [];
  let pos=codeEditor.value.indexOf(word), out=[];
  while(pos!==-1){ out.push(pos); pos=codeEditor.value.indexOf(word,pos+word.length);}
  return out;
}

document.getElementById('btnFind').addEventListener('click', () => { document.getElementById('findPanel').style.display='block'; document.getElementById('findInput').focus(); });
document.getElementById('findClose').addEventListener('click', () => { document.getElementById('findPanel').style.display='none'; });

document.getElementById('btnFindNext').addEventListener('click', () => {
  const word = document.getElementById('findInput').value;
  if(!word){ showStatus('Masukkan teks untuk dicari','warning'); return; }
  findMatches = performFind();
  if(!findMatches.length){ showStatus('Teks tidak ditemukan','warning'); return; }
  findIndex=(findIndex+1)%findMatches.length;
  const pos=findMatches[findIndex];
  codeEditor.focus(); codeEditor.setSelectionRange(pos,pos+word.length);
  showStatus(`Ditemukan ${findMatches.length} hasil`,'info');
});

document.getElementById('btnReplace').addEventListener('click', () => {
  const from = document.getElementById('findInput').value;
  const to = document.getElementById('replaceInput').value;
  if(!from){ showStatus('Masukkan teks untuk diganti','warning'); return; }
  const pos=codeEditor.selectionStart, end=codeEditor.selectionEnd;
  if(codeEditor.value.substring(pos,end)===from){
    codeEditor.setRangeText(to,pos,end,'end'); updateLineNumbers(); saveCurrentTab(); showStatus('Teks diganti','success');
  } else { document.getElementById('btnFindNext').click(); }
});

document.getElementById('btnReplaceAll').addEventListener('click', () => {
  const from = document.getElementById('findInput').value;
  const to = document.getElementById('replaceInput').value;
  if(!from){ showStatus('Masukkan teks untuk diganti','warning'); return; }
  const count = (codeEditor.value.match(new RegExp(from,'g'))||[]).length;
  codeEditor.value=codeEditor.value.split(from).join(to); updateLineNumbers(); saveCurrentTab(); showStatus(`${count} teks diganti`,'success');
});

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown', (e) => {
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveCurrentTab(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){ e.preventDefault(); document.getElementById('btnFind').click(); }
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='F'){ e.preventDefault(); formatCode(); }
  if(e.key==='Tab'&&document.activeElement===codeEditor){
    e.preventDefault();
    const start=codeEditor.selectionStart, end=codeEditor.selectionEnd;
    codeEditor.value=codeEditor.value.substring(0,start)+'  '+codeEditor.value.substring(end);
    codeEditor.selectionStart=codeEditor.selectionEnd=start+2;
    updateLineNumbers();
  }
  if(e.key==='Escape'){
    if(document.getElementById('findPanel').style.display==='block'){ document.getElementById('findPanel').style.display='none'; }
    else if(previewOverlay.style.display==='flex'){ hidePreview(); }
  }
});

// ===================== INITIALIZATION =====================
document.addEventListener('DOMContentLoaded', () => {
  const savedTheme=localStorage.getItem('IDE_THEME');
  if(savedTheme==='light'){ document.body.classList.add('light-mode'); document.querySelector('#themeToggle i').className='fas fa-sun'; }
  codeEditor.value=codeData.html;
  updateLineNumbers();
  codeEditor.focus();
  //showStatus('WEB IDE Pro v2.0 siap digunakan!', 'success');
});
</script>
